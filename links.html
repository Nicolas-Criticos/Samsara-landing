<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samsara — Support the Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #1a1208;
    }

    /* ── Olive tree backdrop ── */
    .backdrop {
      position: fixed;
      inset: 0;
      background-image: url('assets/images/backdrop.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.35) saturate(0.7);
      z-index: 0;
    }

    /* ── Logo watermark over trees ── */
    .logo-bg {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      pointer-events: none;
    }

    .logo-bg img {
      width: 100vmin;
      max-width: 900px;
      opacity: 0.18;
      mix-blend-mode: screen;
    }

    /* ── Dark vignette to keep content readable ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(
        ellipse at center,
        rgba(26, 18, 8, 0.25) 0%,
        rgba(26, 18, 8, 0.65) 100%
      );
      z-index: 2;
    }

    /* ── Main card ── */
    .card {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 3rem 2.5rem 3.5rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-wrap img {
      display: none;
    }

    /* ── Heading ── */
    .heading {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.5rem, 5vw, 2rem);
      line-height: 1.35;
      color: #f7f0e6;
      letter-spacing: 0.02em;
    }

    .heading em {
      font-style: italic;
      color: #c9a040;
    }

    /* ── Divider ── */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, #c9a040, transparent);
    }

    /* ── Buttons ── */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 1rem 1.5rem;
      border-radius: 3px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn-primary {
      background: #c9a040;
      color: #1a1208;
      border: 1px solid #c9a040;
    }

    .btn-primary:hover {
      background: #e8c96a;
      border-color: #e8c96a;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(201, 160, 64, 0.35);
    }

    .btn-secondary {
      background: transparent;
      color: #f7f0e6;
      border: 1px solid rgba(247, 240, 230, 0.45);
    }

    .btn-secondary:hover {
      background: rgba(247, 240, 230, 0.08);
      border-color: rgba(247, 240, 230, 0.75);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(247, 240, 230, 0.08);
    }

    .btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ── Tagline ── */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: rgba(247, 240, 230, 0.45);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="backdrop"></div>
  <div class="logo-bg">
    <img src="assets/images/samsara-logo-brown.jpg" alt="" />
  </div>
  <div class="overlay"></div>

  <div class="card">

    <!-- Logo -->
    <div class="logo-wrap">
      <img src="assets/images/samsara-tree-logo.jpg" alt="Samsara" />
    </div>

    <!-- Heading -->
    <h1 class="heading">
      Please support my project<br />
      restoring <em>5,000 olive trees</em>
    </h1>

    <div class="divider"></div>

    <!-- Buttons -->
    <div class="buttons">

      <!-- Olive Oil Shop -->
      <a href="https://samsara-landing-psi.vercel.app/" target="_blank" rel="noopener" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C8 2 5 5.5 5 9c0 4.5 7 13 7 13s7-8.5 7-13c0-3.5-3-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        Organic Olive Oil
      </a>

      <!-- Milli Funding -->
      <a href="https://www.milli.org/campaign/awHBM5bjHdKV44T5fwKe?ref=share_whatsapp" target="_blank" rel="noopener" class="btn btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        Milli Funding
      </a>

    </div>

    <p class="tagline">Samsara · Swartberg Karoo, South Africa</p>

  </div>
</body>
</html>
